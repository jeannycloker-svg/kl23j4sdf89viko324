langcode: en
status: true
dependencies:
  module:
    - contact
id: contact.user.copy
configuration:
  email_body:
    content:
      value: |-
        <p class="contact-email-intro">Here is a copy of the message you sent to {{ recipient_name }} at {{ site_name }}.</p>
        <hr>
        {{ contact_message }}
      format: email_html
