services:
  solr10:
    image: solr:10
    ports:
      - "8983:8983"
    volumes:
      - ./cloud-config-set:/opt/solr/server/solr/configsets/drupal/conf
    environment:
      SOLR_MODULES: "extraction,langid,ltr,analysis-extras"
      JDK_JAVA_OPTIONS: "-Djdk.xml.maxGeneralEntitySizeLimit=0 -Djdk.xml.totalEntitySizeLimit=0"
    command: bash -c "docker-entrypoint.sh solr start; solr create --verbose -c drupal -d server/solr/configsets/drupal/conf -n drupal; solr restart -f"
