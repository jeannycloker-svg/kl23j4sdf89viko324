# https://git.drupalcode.org/project/gitlab_templates/
variables:
  OPT_IN_TEST_PREVIOUS_MAJOR: '1'
  OPT_IN_TEST_PREVIOUS_MINOR: '1'
  _PHPUNIT_CONCURRENT: '1'
  _PHPUNIT_TESTGROUPS: 'ui_patterns'

include:
  - project: $_GITLAB_TEMPLATES_REPO
    ref: $_GITLAB_TEMPLATES_REF
    file:
      - "/includes/include.drupalci.main.yml"
      - "/includes/include.drupalci.variables.yml"
      - "/includes/include.drupalci.workflows.yml"

.skip-phpmd-rule: &skip-phpmd-rule
  if: '$SKIP_PHPMD == "1"'
  when: never

.phpmd-base:
  stage: validate
  rules:
    - !reference [.opt-in-current-rule]
    - *skip-phpmd-rule
    - !reference [.php-files-exist-rule]
  needs:
    - composer
  before_script:
    - curl -fsSL https://phpmd.org/static/latest/phpmd.phar -o vendor/bin/phpmd
    - chmod +x vendor/bin/phpmd
  script:
    - php --version
    - vendor/bin/phpmd --version
    - |
      BASELINE_FILE="${_WEB_ROOT}/modules/custom/${CI_PROJECT_NAME}/.phpmd.baseline.xml"
      PHPMD_CONFIG="${_WEB_ROOT}/modules/custom/${CI_PROJECT_NAME}/.phpmd.xml"
      if [ -f "$BASELINE_FILE" ]; then
        sed -i "s#/builds/project/ui_patterns#${CI_PROJECT_DIR}#g" "$BASELINE_FILE"
      fi
      if [ -f "$PHPMD_CONFIG" ]; then
        BASELINE_ARG=""
        if [ -f "$BASELINE_FILE" ]; then
          BASELINE_ARG="--baseline-file $BASELINE_FILE"
        fi
        vendor/bin/phpmd "${_WEB_ROOT}/modules/custom/${CI_PROJECT_NAME}" gitlab "$PHPMD_CONFIG" --exclude 'tests/*,**/tests/*' $BASELINE_ARG > phpmd-quality-report.json || true
        vendor/bin/phpmd "${_WEB_ROOT}/modules/custom/${CI_PROJECT_NAME}" text "$PHPMD_CONFIG" --exclude 'tests/*,**/tests/*' $BASELINE_ARG
      else
        echo "[Notice] File .phpmd.xml not found at ${PHPMD_CONFIG}, skipping phpmd."
      fi
  allow_failure: false
  artifacts:
    expose_as: phpmd
    when: always
    expire_in: 6 mos
    reports:
      codequality: phpmd-quality-report.json
    name: artifacts-$CI_PIPELINE_ID-$CI_JOB_NAME_SLUG
    paths:
      - phpmd-quality-report.json

.twig-lint-base:
  stage: validate
  before_script:
    - composer require --dev vincentlanglet/twig-cs-fixer
  script:
    - vendor/bin/twig-cs-fixer lint --config=$_WEB_ROOT/modules/custom/$CI_PROJECT_NAME/.twig-cs-fixer.php $_WEB_ROOT/modules/custom/$CI_PROJECT_NAME
  rules:
    - changes:
        - "**/*.twig"
    - if: '$CI_PIPELINE_SOURCE == "push"'
  allow_failure: false
  artifacts:
    expose_as: twig-lint
    when: always
    expire_in: 6 mos
    reports:
      codequality: twig-lint-quality-report.xml
    name: artifacts-$CI_PIPELINE_ID-$CI_JOB_NAME_SLUG
    paths:
      - twig-lint-quality-report.xml

phpmd:
  extends: .phpmd-base
twig-lint:
  extends: .twig-lint-base
composer-lint:
  allow_failure: false
cspell:
  allow_failure: false
  variables:
    _CSPELL_IGNORE_PATHS: '**/tests/fixtures/config/*.yml, **/tests/fixtures/*.yml'
eslint:
  allow_failure: false
phpcs:
  allow_failure: false
phpstan:
  allow_failure: false
phpstan (previous major):
  allow_failure: true
phpunit:
  allow_failure: false
  variables:
    _PHPUNIT_EXTRA: ''
