# @file
# Custom services for the Metatag module.

services:
  plugin.manager.metatag.tag:
    class: Drupal\metatag\MetatagTagPluginManager
    parent: default_plugin_manager

  plugin.manager.metatag.group:
    class: Drupal\metatag\MetatagGroupPluginManager
    parent: default_plugin_manager

  metatag.token:
    class: Drupal\metatag\MetatagToken
    arguments:
      - '@token'
      - '@token.entity_mapper'

  metatag.manager:
    class: Drupal\metatag\MetatagManager
    arguments:
      - '@plugin.manager.metatag.group'
      - '@plugin.manager.metatag.tag'
      - '@metatag.token'
      - '@logger.factory'
      - '@entity_type.manager'
      - '@path.matcher'
      - '@current_route_match'
      - '@request_stack'
      - '@language_manager'
      - '@config.factory'

  metatag.trimmer:
    class: Drupal\metatag\MetatagTrimmer

  # Used for legacy hooks, will be removed later.
  # @see https://www.drupal.org/project/metatag/issues/3579738
  Drupal\metatag\Hook\EntityHooks:
    class: Drupal\metatag\Hook\EntityHooks
    autowire: true
  Drupal\metatag\Hook\FormHooks:
    class: Drupal\metatag\Hook\FormHooks
    autowire: true
  Drupal\metatag\Hook\HelpHooks:
    class: Drupal\metatag\Hook\HelpHooks
    autowire: true
  Drupal\metatag\Hook\MigrateHooks:
    class: Drupal\metatag\Hook\MigrateHooks
    autowire: true
  Drupal\metatag\Hook\OutputHooks:
    class: Drupal\metatag\Hook\OutputHooks
    autowire: true
  Drupal\metatag\Hook\TokenHooks:
    class: Drupal\metatag\Hook\TokenHooks
    autowire: true
