################
# GitLabCI template for Drupal projects.
#
# This template is designed to give any Contrib maintainer everything they need
# to test, without requiring modification. It is also designed to keep up to
# date with Core Development automatically through the use of include files
# that can be centrally maintained. As long as you include the project, ref and
# three files below, any future updates added by the Drupal Association will be
# used in your pipelines automatically. However, you can modify this template
# if you have additional needs for your project. The full documentation is on:
# https://project.pages.drupalcode.org/gitlab_templates/
################

# For information on alternative values for 'ref' see
# https://project.pages.drupalcode.org/gitlab_templates/info/templates-version/
include:
  - project: $_GITLAB_TEMPLATES_REPO
    ref: $_GITLAB_TEMPLATES_REF
    file:
      - '/includes/include.drupalci.main.yml'
      - '/includes/include.drupalci.variables.yml'
      - '/includes/include.drupalci.workflows.yml'
#
################
# Pipeline configuration variables are defined with default values and
# descriptions in the file:
# https://git.drupalcode.org/project/gitlab_templates/-/blob/main/includes/include.drupalci.variables.yml
################

variables:
  # Extra words for CSpell; comma-separated.
  # 3529741: Added the Spanish, French and German words.
  # 3458724: Added fediverse.
  _CSPELL_WORDS: "españa, große, größe, müller, niño, résumé, rêve, schöne, fediverse"

  # Run tests against the previous and next core major releases, to help make
  # sure small changes don't break anything too quickly.
  OPT_IN_TEST_NEXT_MINOR: 1
  OPT_IN_TEST_PREVIOUS_MAJOR: 1
  OPT_IN_TEST_MAX_PHP: 1

  # Run tests in parallel.
  _PHPUNIT_CONCURRENT: 1

# Work around a problem with the contrib History module, which is not compatible
# with Drupal 10.
  _LENIENT_ALLOW_LIST: "history"
after_script:
  - rm -r web/modules/contrib/history

# Don't allow failures from coding standards tests.
cspell:
  allow_failure: false
phpcs:
  allow_failure: false
# @todo Fix all phpstan issues.
# phpstan:
#   allow_failure: false
stylelint:
  allow_failure: false

# Allow page_manager and hal to be installed, regardless of core compatibility.
composer:
  variables:
    _LENIENT_ALLOW_LIST: page_manager, hal
composer (next major):
  variables:
    _LENIENT_ALLOW_LIST: page_manager, hal
